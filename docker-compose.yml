# =========================================================================
# NovaStream — production stack (phase 2 : Redis + tuning perf)
# =========================================================================
# Conteneurs :
#   - novastream       : app (FastAPI + frontend static buildé), expose :8001
#   - novastream-mongo : stockage views + referrers
#   - novastream-redis : cache partagé (resolve + playlists HLS), TTL natif
# =========================================================================
services:
  mongo:
    image: mongo:4.4
    container_name: novastream-mongo
    restart: unless-stopped
    command:
      - --bind_ip_all
      - --wiredTigerCacheSizeGB
      - "1"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - novastream_internal
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_swappiness: 0
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: novastream-redis
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    networks:
      - novastream_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 5s
    mem_swappiness: 0
    deploy:
      resources:
        limits:
          memory: 640M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL}
        REACT_APP_SUPABASE_URL: ${REACT_APP_SUPABASE_URL}
        REACT_APP_SUPABASE_ANON_KEY: ${REACT_APP_SUPABASE_ANON_KEY}
    image: novastream:latest
    container_name: novastream
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8001"
    environment:
      MONGO_URL: "mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB_NAME}?authSource=admin"
      DB_NAME: ${MONGO_DB_NAME}
      REDIS_URL: "redis://redis:6379/0"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      STATIC_DIR: /app/static
      # malloc tuning — force Python à rendre la mémoire à l'OS après libération
      MALLOC_TRIM_THRESHOLD_: "65536"
      MALLOC_MMAP_THRESHOLD_: "131072"
      PYTHONMALLOC: "malloc"
    mem_swappiness: 0
    networks:
      - novastream_internal
      - npmplus_default
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "5"

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local

networks:
  novastream_internal:
    driver: bridge
    name: novastream_internal
  npmplus_default:
    external: true